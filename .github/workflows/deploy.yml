name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_port: ${{ secrets.BASTION_PORT }}
          proxy_username: ${{ secrets.BASTION_USER }}
          proxy_key: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          debug: true
          script: |
            set -e
            cd /opt/react-app
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
  debug-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect secret shapes
        env:
          BSK: ${{ secrets.BASTION_SSH_PRIVATE_KEY }}
          DSK: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "BASTION length: ${#BSK}"
          echo "DEPLOY  length: ${#DSK}"
          echo "BASTION first line: $(printf '%s' "$BSK" | head -1)"
          echo "BASTION last line:  $(printf '%s' "$BSK" | tail -1)"
          echo "DEPLOY  first line: $(printf '%s' "$DSK" | head -1)"
          echo "DEPLOY  last line:  $(printf '%s' "$DSK" | tail -1)"
          echo "BASTION sha256: $(printf '%s' "$BSK" | sha256sum)"
          echo "DEPLOY  sha256: $(printf '%s' "$DSK" | sha256sum)"
