services:
  web:
    image: ghcr.io/honomuller/test1:latest
    container_name: react-app
    restart: unless-stopped
    ports:
      - "80:8080"
    pull_policy: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
